name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache buildozer
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}

      - name: Install deps
        run: |
          sudo dpkg --add-architecture i386
          sudo apt update -qq
          sudo apt install -y -qq git zip unzip openjdk-17-jdk autoconf libtool \
            pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake \
            libffi-dev libssl-dev libltdl-dev

      - name: Install buildozer
        run: pip install buildozer cython

      - name: Switch entry
        run: cp android_app.py main.py

      - name: Build APK
        run: buildozer android debug

      - name: Find APK
        if: always()
        run: find . -name "*.apk" -type f 2>/dev/null || echo "no apk"

      - name: Upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: APK
          path: |
            bin/*.apk
            *.apk
            .buildozer/**/debug/*.apk
