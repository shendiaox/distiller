name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system deps
        run: |
          sudo apt update -qq
          sudo apt install -y -qq git zip unzip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake \
            libffi-dev libssl-dev libltdl-dev python3-pip

      - name: Install Buildozer
        run: pip install buildozer cython

      - name: Switch entry point
        run: |
          mv main.py desktop_main.py
          mv android_app.py main.py

      - name: Build APK
        run: buildozer android debug 2>&1

      - name: Show build result
        run: ls -la bin/ 2>/dev/null || ls -la *.apk 2>/dev/null || echo "No APK found"

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Distiller-APK
          path: |
            bin/*.apk
            *.apk
